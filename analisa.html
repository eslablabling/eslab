<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Analisa Lab | PT Envirotama Solusindo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            min-height: 100vh; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; 
            background: var(--bg-card); 
            border-right: 1px solid var(--border-color); 
            padding: 24px 16px; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 16px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 12px; 
            margin-bottom: 4px; 
            font-size: 0.85rem; 
        }
        .nav-item.active, .nav-item:hover { background: #eff6ff; color: var(--primary); }

        /* --- CONTENT AREA --- */
        .content { flex-grow: 1; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .table-section { 
            background: var(--bg-card); 
            border-radius: 20px; 
            padding: 24px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* --- TABLE STYLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--bg-main); }
        td { padding: 18px 15px; font-size: 0.85rem; border-bottom: 1px solid #f1f5f9; }
        tr:hover td { background-color: #f8fafc; }

        /* --- BADGES --- */
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
        .badge-wait { background: #fff7ed; color: #c2410c; }
        .badge-done { background: #f0fdf4; color: #166534; }

        /* --- MODAL --- */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: white; 
            width: 800px; /* Diperlebar agar 4 kolom input nyaman dibaca */
            max-height: 90vh;
            margin: 2% auto; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow-y: auto; 
        }
        
        /* --- FORM --- */
        .grid-form { display: grid; gap: 12px; margin-top: 20px; }
        .form-group { 
            background: #f8fafc; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        .form-group label { font-size: 0.75rem; font-weight: 800; color: var(--text-main); display: block; margin-bottom: 8px; }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-family: inherit; 
            font-weight: 600;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); background: #fff; }
        
        .qc-input, .grav-input {
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
        }
        .qc-input:focus, .grav-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }
        .method-text { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; display: block; font-style: italic; }

        /* --- BUTTONS --- */
        .btn-small { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.2s; }
        .btn-small:hover { background: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 25px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .btn-save:hover { background: var(--primary-hover); }

        #searchAnalisa {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 300px;
            font-family: inherit;
            background: #f1f5f9;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            transition: 0.2s;
            margin-right: 5px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .tab-btn:hover:not(.active) {
            background: #e2e8f0;
        }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: white;
            font-weight: 700;
            cursor: pointer;
            color: #64748b;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .page-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #cbd5e1;
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="margin-bottom: 30px; padding: 0 10px;">
            <img src="eslab-logo.gif" alt="Logo" style="width: 150px;">
        </div>
        <nav id="dynamicSidebar">
            </nav>
    </aside>

    <main class="content">
        <header class="top-bar">
            <div>
                <h2 style="font-weight: 800; letter-spacing: -0.02em;">Log Analisa Laboratorium</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Kelola dan input hasil pengujian sampel dari lapangan.</p>
            </div>
            <div style="text-align: right;">
                <div id="userFullName" style="font-weight: 800; color: var(--primary);">Memuat...</div>
                <span style="font-size: 0.7rem; color: var(--text-muted); font-weight: 600;">Analis Laboratorium</span>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <h3 style="font-size: 1.1rem; font-weight: 800;">Antrean Analisa</h3>
                <input type="text" id="searchAnalisa" placeholder="Cari ID Sampel atau Perusahaan...">
            </div>

            <!-- Tab Filter Status Analisa -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="tabBelumSelesai" class="tab-btn active" onclick="switchAnalisaTab('belum_selesai')">⏳ Belum Selesai</button>
                <button id="tabSudahSelesai" class="tab-btn" onclick="switchAnalisaTab('sudah_selesai')">✅ Sudah Selesai</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>ID Sampel</th>
                        <th>Perusahaan / Lokasi</th>
                        <th>Parameter & Status</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="analisaTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 50px; color: var(--text-muted);">
                            Menghubungkan ke database laboratorium...
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Panel Paginasi -->
            <div id="paginationControls" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; flex-wrap: wrap; gap: 10px;">
                <div id="paginationInfo" style="color: #64748b; font-weight: 600;">
                    Menampilkan 0 - 0 dari 0 data
                </div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button id="btnPrevPage" class="page-btn">Sebelumnya</button>
                    <div id="pageNumbers" style="display: flex; gap: 5px;"></div>
                    <button id="btnNextPage" class="page-btn">Berikutnya</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modalAnalisa" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                <div>
                    <h3 id="modalTitle" style="font-weight: 800; font-size: 1.3rem;">Input Hasil Analisa</h3>
                    <p id="modalSubtitle" style="color: var(--text-muted); font-size: 0.8rem;"></p>
                </div>
                <button onclick="tutupModalAnalisa()" style="background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; color: var(--text-muted);">✕</button>
            </div>

            <div class="grid-form" id="parameterInputs">
                </div>

            <button class="btn-save" id="btnSimpanAnalisa">💾 Simpan Hasil Analisa</button>
            <button id="btnBatal" onclick="tutupModalAnalisa()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; width:100%; margin-top:20px; font-weight: 700; font-size: 0.9rem;">Tutup & Batal</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js?v=2"></script>
    <script src="analisa.js?v=2"></script> 
</body>
</html>
