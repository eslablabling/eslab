<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak CoA | PT Envirotama Solusindo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            min-height: 100vh; 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; 
            background: var(--bg-card); 
            border-right: 1px solid var(--border-color); 
            padding: 24px 16px; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 16px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 12px; 
            margin-bottom: 4px; 
            font-size: 0.85rem; 
        }
        .nav-item.active { background: #eff6ff; color: var(--primary); }

        /* --- CONTENT AREA --- */
        .content { flex-grow: 1; padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* Tombol Aksi (Hanya muncul di layar) */
        .action-bar { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px;
        }

        /* --- COA PAPER STYLE --- */
        .coa-paper {
            background: white;
            padding: 50px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 297mm; /* A4 Height */
            position: relative;
        }

        .coa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #0f172a;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .coa-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .coa-table th, .coa-table td {
            border: 1px solid #cbd5e1;
            padding: 12px;
            font-size: 0.85rem;
            text-align: left;
        }
        .coa-table th { background: #f8fafc; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; }

        /* --- PRINT LOGIC --- */
        .print-footer {
            display: none !important;
        }

        @page {
            size: A4;
            margin-top: 3.5cm;
            margin-bottom: 4.2cm;
            margin-left: 1.3cm;
            margin-right: 1.3cm;
        }

        @media print {
            .sidebar, .action-bar, .nav-item, .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .content { padding: 0; margin: 0; max-width: 100%; }
            .coa-paper { border: none; box-shadow: none; padding: 0; margin: 0; }
            .coa-page {
                box-shadow: none;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                min-height: 0 !important;
                page-break-after: always;
                page-break-inside: avoid;
            }
            .print-footer {
                display: flex !important;
                position: fixed;
                bottom: -3.2cm;
                left: 0;
                right: 0;
                justify-content: space-between;
                font-size: 0.75rem;
                font-family: inherit;
                color: #000;
                border-top: 1px solid #000;
                padding-top: 5px;
            }
            .page-number-display::after {
                content: counter(page);
            }
        }

        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

.coa-table-v2 {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid #000;
    font-size: 0.8rem;
}

.coa-table-v2 th, .coa-table-v2 td {
    border: 1px solid #000;
    padding: 6px 8px;
}

.coa-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 10px 0;
    font-size: 0.85rem;
}
/* Pastikan setiap halaman adalah area terisolasi */
.coa-page {
    position: relative; /* Kunci perbaikan */
    width: 210mm; /* Standar A4 */
    min-height: 297mm;
    padding: 40px;
    margin: 20px auto;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    page-break-after: always; /* Agar rapi saat print */
    overflow: hidden;
}
.tab-btn {
    padding: 8px 16px;
    border: none;
    background: #f1f5f9;
    color: #64748b;
    font-weight: 800;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 8px;
    white-space: nowrap;
    transition: 0.2s;
    margin-right: 5px;
}
.tab-btn.active {
    background: var(--primary);
    color: white;
}
.tab-btn:hover:not(.active) {
    background: #e2e8f0;
}
.page-btn {
    padding: 8px 14px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: white;
    font-weight: 700;
    cursor: pointer;
    color: #64748b;
    font-size: 0.8rem;
    transition: all 0.2s;
}
.page-btn:hover {
    background: #f1f5f9;
    color: #1e293b;
    border-color: #cbd5e1;
}
.page-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
#searchCoA {
    padding: 12px 16px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    width: 300px;
    font-family: inherit;
    background: #f1f5f9;
}

/* --- PARAMETER VISIBILITY & AUTOMATIC COUNTING --- */
.coa-table-v2 tbody {
    counter-reset: serial-num;
}
.coa-table-v2 tbody tr:not(.unchecked-param-row) {
    counter-increment: serial-num;
}
.coa-table-v2 tbody tr:not(.unchecked-param-row) td.serial-col::before {
    content: counter(serial-num);
}
.coa-table-v2 tbody tr.unchecked-param-row td.serial-col::before {
    content: "-";
}
.unchecked-param-row {
    opacity: 0.4;
    background-color: #f1f5f9;
}
@media print {
    .unchecked-param-row {
        display: none !important;
    }
    .no-print {
        display: none !important;
    }
}
    </style>
</head>
<body>

    <div class="print-footer">
        <span>Form-ES-7.8.1; Rev.00; 3 Februari 2016</span>
        <span class="page-number-display">Page </span>
    </div>

    <aside class="sidebar no-print">
        <div style="margin-bottom: 30px; padding: 0 10px;">
            <img src="eslab-logo.gif" alt="Logo" style="width: 150px;">
        </div>
        <nav id="dynamicSidebar">
            </nav>
    </aside>

    <main class="content">
        <div class="action-bar no-print">
            <button onclick="window.location.href='coa.html'" class="nav-item" style="border:none; cursor:pointer;">🏠 Home CoA</button>
            
            <div id="dynamicButtons" style="display: flex; gap: 10px;">
                <button onclick="window.print()" class="btn-print" id="btnPrint" style="display:none;">🖨️ Cetak Dokumen</button>
            </div>
        </div>

        <div id="coaRenderArea">
            </div>
    </main>

    <script src="config.js"></script>
    <script src="auth.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="coa.js?v=2"></script>
</body>
</html>
