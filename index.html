<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lab Environmental Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- CSS MURNI (Vanilla) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8; 
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Background Aurora */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, #1e3a8a 0px, transparent 40%),  /* Blue 900 */
                radial-gradient(at 100% 0%, #064e3b 0px, transparent 40%), /* Emerald 900 */
                radial-gradient(at 100% 100%, #1e1b4b 0px, transparent 40%), /* Indigo 950 */
                radial-gradient(at 0% 100%, #111827 0px, transparent 40%);
            filter: blur(60px);
            background-size: 200% 200%;
            animation: aurora-flow 15s ease-in-out infinite alternate;
        }

        @keyframes aurora-flow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 50% 0%; }
        }

        /* Box Login Tetap Sama */
        .glass-modern {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 1);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 32px 64px -15px rgba(0,0,0,0.08);
            position: relative;
        }

        /* HEADER & LOGO BARU */
        .header { text-align: center; margin-bottom: 40px; }
        
        .logo-container {
            width: 110px; /* Ukuran pas untuk .gif */
            height: 110px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }   

        .logo-img {
            width: 350%;
            height: 350%;
            object-fit: contain; /* Menjaga rasio logo agar tidak gepeng */
            position: relative;
            z-index: 2;
        }

        .logo-glow {
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            filter: blur(20px);
            transform: scale(1.2);
        }

        h2 { font-size: 1.75rem; font-weight: 800; color: #1e293b; letter-spacing: -0.02em; }

        /* Form styling */
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; margin-left: 4px; }
        
        .input-box { position: relative; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.4); }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="glass-modern">
        <div class="header">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <img src="eslab-logo.gif" alt="Logo PT Envirotama Solusindo" class="logo-img">
            </div>
            
            <h2>PT Envirotama Solusindo</h2>
            <p style="color: #64748b; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.1em;">Environmental Laboratory</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-box">
                    <input type="text" id="username" placeholder="Masukkan username..." required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="btnSubmit">
                Masuk ke Sistem
            </button>
        </form>

        <div id="message" style="margin-top: 15px; text-align: center; font-size: 0.8rem; font-weight: 600; display: none;"></div>

        <div class="footer">
            <span>V.01</span>
            <span>2026</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
