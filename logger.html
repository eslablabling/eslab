<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        /* Sidebar Styling agar sesuai dengan auth.js */
        #dynamicSidebar {
            min-height: 100vh;
            border-right: 1px solid #e2e8f0;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            margin: 4px 0;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background-color: #f8fafc;
            color: #2563eb;
        }
        .nav-item.active {
            background-color: #eff6ff;
            color: #2563eb;
            font-weight: 600;
        }
        
        /* Badge Custom */
        .badge-insert { background-color: #22c55e !important; color: white; }
        .badge-update { background-color: #f59e0b !important; color: white; }
        .badge-delete { background-color: #ef4444 !important; color: white; }
        
        .main-content { padding: 25px; }
    </style>
    <!-- PWA & Shortcut Support (Android, iOS, Desktop) -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ESLab LIMS">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="pwa-install.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 bg-white p-0 shadow-sm">
            <div id="dynamicSidebar" class="p-3">
                <div class="text-center p-3">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0" id="userName">Data Log Aktivitas</h4>
                    <small class="text-muted" id="currentDate">Memuat tanggal...</small>
                </div>
                <div class="d-flex gap-2">
                    <span id="userRoleDisplay" class="badge bg-secondary">ROLE</span>
                    <button id="btnLogout" class="btn btn-sm btn-outline-danger">🚪 Keluar</button>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold text-primary">🛡️ Audit Logs System</h6>
                    <button class="btn btn-sm btn-primary" onclick="fetchLogs()">🔄 Segarkan Data</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-3">Waktu</th>
                                    <th>User</th>
                                    <th>Aksi</th>
                                    <th>Modul/Tabel</th>
                                    <th>Detail</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body">
                                <tr>
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        Menghubungkan ke database...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="logModalLabel">🔍 Detail Aktivitas</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">
                <div id="modalContent">
                    </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="logger.js"></script>

    <script src="pwa-install.js"></script>
</body>
</html>
