<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data Emisi | LIMS Envirotama</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE STYLE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; position: sticky; top: 0; height: 100vh; }
        .brand { display: flex; align-items: center; justify-content: center; margin-bottom: 30px; padding: 10px; height: 70px; overflow: hidden; }
        .brand img { max-width: 100%; max-height: 50px; object-fit: contain; }
        
        .nav-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 10px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; margin-bottom: 4px; color: #64748b; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: 0.2s; }
        .nav-item:hover { background: #f1f5f9; color: #1e293b; }
        .nav-item.active { background: #eff6ff; color: #2563eb; }

        /* --- TOP BAR STYLE --- */
        .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .top-bar { 
            background: #f8fafc; 
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .welcome-text h2 { font-size: 1.2rem; font-weight: 800; color: #0f172a; }
        .welcome-text p { font-size: 0.8rem; color: #64748b; }

        /* --- CONTENT AREA --- */
        .content-body { padding: 30px 40px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }

        /* --- TABLE STYLE --- */
        .table-container { background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .search-box { width: 100%; padding: 12px 18px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; outline: none; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; text-align: left; }
        td { padding: 16px; font-size: 0.85rem; border-bottom: 1px solid #f1f5f9; }
        .badge-method { font-family: monospace; font-size: 0.75rem; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; }
        
        .btn-primary { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #1d4ed8; }

        /* --- MODAL STYLE --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 700px; margin: 40px auto; border-radius: 24px; padding: 32px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-family: inherit; }
        
        .param-row { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 15px; position: relative; }
        .method-input-group { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><img src="eslab-logo.gif" alt="Logo"></div>
        <nav class="nav-menu" id="dynamicSidebar"></nav>
    </aside>

    <main class="main">
        <div class="top-bar">
            <div class="welcome-text">
                <h2 id="userName">Memuat...</h2>
                <p>Manajemen Master Data Regulasi & Parameter Emisi.</p>
            </div>

            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="currentDate" style="font-size: 0.8rem; font-weight: 700; color: #475569; background: #fff; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 12px;">
                    Memuat tanggal...
                </div>

                <div style="display: flex; align-items: center; gap: 10px; border-left: 1px solid #e2e8f0; padding-left: 15px;">
                    <div style="text-align: right;">
                        <p id="userFullName" style="font-size: 0.8rem; font-weight: 800;">...</p>
                        <p id="userRoleDisplay" style="font-size: 0.65rem; color: #64748b; text-transform: uppercase;">Role</p>
                    </div>
                    <button id="btnLogout" style="background: none; border: none; cursor: pointer; font-size: 1.2rem;">🚪</button>
                </div>
            </div>
        </div>

        <div class="content-body">
            <div class="header-actions">
                <div>
                    <h3 style="font-weight: 800;">🗂️ Daftar Parameter</h3>
                </div>
                <button class="btn-primary" onclick="openModal()">➕ Tambah Master Data</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="background: #16a34a;" onclick="exportToExcel()">📥 Export Excel</button>
                <button class="btn-primary" style="background: #0891b2;" onclick="document.getElementById('importFile').click()">📤 Import Excel</button>
                <input type="file" id="importFile" style="display: none;" accept=".xlsx, .xls" onchange="importFromExcel(event)">
            </div>

            <div class="table-container">
                <input type="text" id="searchBar" class="search-box" placeholder="Cari regulasi atau parameter...">
                <table>
                    <thead>
                        <tr>
                            <th width="20%">📌 Dasar Regulasi</th>
                            <th width="20%">🧪 Parameter Uji</th>
                            <th width="10%">📏 Satuan</th>
                            <th width="25%">📑 Metode Analisa</th>
                            <th width="10%">📊 Baku Mutu</th>
                            <th width="10%">💨 O₂ Kor (%)</th>
                            <th width="5%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="paramTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalParam" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-weight: 800;">🛠️ Tambah Master Data</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">✕</button>
            </div>

            <form id="formMaster">
                <div class="form-group">
                    <label>Nama Regulasi / Dasar Hukum</label>
                    <input type="text" id="regulasi" class="form-control" list="listRegulasi" placeholder="Contoh: PermenLHK P.11/2021 Lamp. I" required>
                    
                    <datalist id="listRegulasi"></datalist>
                </div>

                <div id="parameterContainer">
                    <div class="param-row" style="border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                                <input type="text" class="param-name form-control" placeholder="Nama Parameter (Contoh: Partikulat)" required>
                                
                                <input type="text" class="satuan form-control" placeholder="Satuan (mg/Nm3)" required>
                                
                                <input type="number" step="any" class="baku-mutu form-control" placeholder="Baku Mutu">
                                
                                <input type="number" step="0.1" class="koreksi-o2 form-control" placeholder="Koreksi O2 (%)">
                            </div>
                        </div>

                        <div class="method-list">
                            <label style="font-size: 0.65rem; font-weight: 800; color: #64748b;">Metode Analisa</label>
                            <div class="method-input-group">
                                <input type="text" class="method-name form-control" placeholder="Contoh: SNI 7117.17:2009" required>
                                <button type="button" onclick="addMethodInput(this)" style="padding: 0 15px; border-radius: 10px; border: 1px dashed #2563eb; color: #2563eb; background: none; cursor: pointer; font-weight: bold;">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="addParameterRow()" style="width: 100%; padding: 10px; border-radius: 12px; border: 2px dashed #e2e8f0; background: none; color: #64748b; font-weight: 700; cursor: pointer; margin-bottom: 20px;">
                    ➕ Tambah Parameter Lain (Dalam Regulasi Sama)
                </button>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal()" style="flex:1; padding:12px; border-radius:12px; border:1px solid #e2e8f0; background:white; font-weight:700; cursor:pointer;">Batal</button>
                    <button type="submit" class="btn-primary" style="flex:2;">Simpan Ke Database</button>
                </div>
            </form>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="master-data.js"></script>
</body>
</html>
