<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerimaan Sampel | Lab Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CSS INTERNAL --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo-area {
            padding: 0 10px 30px 10px;
        }

        .logo-area img {
            width: 140px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 16px; /* Dikurangi sedikit agar tidak terlalu bongsor */
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600; /* Jika masih terlalu tebal, ganti ke 500 */
            border-radius: 12px;
            margin-bottom: 4px;
            font-size: 0.85rem; /* Ukuran standar agar tidak terlalu besar */
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* Pastikan icon di dalam nav-item punya jarak yang pas */
        .nav-item i, .nav-item span {
            margin-right: 10px;
        }

        /* --- MAIN CONTENT --- */
        .content {
            flex-grow: 1;
            padding: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-title h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userFullName {
            font-weight: 700;
            color: var(--primary);
        }

        /* --- TABLE SECTION --- */
        .table-section {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        #searchPenerimaan {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 320px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #f1f5f9;
            transition: all 0.2s;
        }

        #searchPenerimaan:focus {
            outline: none;
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            border-bottom: 2px solid var(--bg-main);
        }

        td {
            padding: 18px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .tag-orange { background: #fff7ed; color: #9a3412; }
        .tag-green { background: #f0fdf4; color: #166534; }

        .btn-receive {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-receive:hover { background: var(--primary-hover); }
        .btn-receive:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        #btnLogout {
            background: #fff;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
        }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            transition: 0.2s;
            margin-right: 5px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .tab-btn:hover:not(.active) {
            background: #e2e8f0;
        }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-weight: 700;
            cursor: pointer;
            color: #64748b;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .page-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #cbd5e1;
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <aside class="sidebar no-print">
        <div style="margin-bottom: 30px; padding: 0 10px;">
            <img src="eslab-logo.gif" alt="Logo" style="width: 150px;">
        </div>
        <nav id="dynamicSidebar">
            </nav>
    </aside>

    <main class="content">
        <header class="top-bar">
            <div class="header-title">
                <h2>Penerimaan Sampel</h2>
                <p>Validasi kedatangan sampel dari lapangan ke Laboratorium.</p>
            </div>
            
            <div class="user-profile">
                <span id="userFullName">Memuat...</span>
                <button id="btnLogout">Keluar</button>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <h3 style="font-weight: 800;">Log Antrean Sampel</h3>
                <input type="text" id="searchPenerimaan" placeholder="Cari ID Sampel atau Perusahaan...">
            </div>

            <!-- Tab Filter Status Penerimaan -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="tabBelumDiterima" class="tab-btn active" onclick="switchPenerimaanTab('belum_diterima')">⏳ Belum Diterima</button>
                <button id="tabSudahDiterima" class="tab-btn" onclick="switchPenerimaanTab('sudah_diterima')">✅ Sudah Diterima</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID Sampel</th>
                        <th>Informasi Sampel</th>
                        <th>Status Lab</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="penerimaanTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            Menghubungkan ke database...
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Panel Paginasi -->
            <div id="paginationControls" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; flex-wrap: wrap; gap: 10px;">
                <div id="paginationInfo" style="color: #64748b; font-weight: 600;">
                    Menampilkan 0 - 0 dari 0 data
                </div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button id="btnPrevPage" class="page-btn">Sebelumnya</button>
                    <div id="pageNumbers" style="display: flex; gap: 5px;"></div>
                    <button id="btnNextPage" class="page-btn">Berikutnya</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Edit/Input Tanggal Penerimaan -->
    <div id="modalPenerimaan" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: white; width: 420px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h4 id="penerimaanModalTitle" style="font-weight: 800; font-size: 1.1rem; margin: 0;">Masukkan Tanggal Penerimaan</h4>
                <button onclick="tutupModalPenerimaan()" style="background: #f1f5f9; border: none; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-weight: bold;">✕</button>
            </div>
            
            <div style="margin-bottom: 20px; padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1;">
                <label style="font-size: 0.7rem; font-weight: 800; color: #475569; display: block; margin-bottom: 5px;">📅 TANGGAL PENERIMAAN FISIK</label>
                <div style="position: relative; display: flex; align-items: center; width: 100%;">
                    <input type="text" id="penerimaanTglText" placeholder="DD/MM/YYYY" 
                        style="width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; padding-right: 40px; font-size: 0.9rem; font-family: inherit; font-weight: 600; color: #1e293b; background: white;">
                    <input type="date" id="penerimaanTglPicker" 
                        style="position: absolute; right: 8px; width: 28px; height: 28px; opacity: 0; cursor: pointer; z-index: 10;"
                        onchange="syncPenerimaanDatePicker(this.value)">
                    <span style="position: absolute; right: 10px; font-size: 1.1rem; pointer-events: none; z-index: 5;">📅</span>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 8px;">
                <button onclick="tutupModalPenerimaan()" style="background: #f1f5f9; color: #475569; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.8rem;">Batal</button>
                <button id="btnSimpanPenerimaan" style="background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.8rem;">Simpan</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js?v=2"></script>
    <script src="penerimaan.js?v=2"></script>
</body>
</html>
