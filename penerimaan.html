<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerimaan Sampel | Lab Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CSS INTERNAL --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo-area {
            padding: 0 10px 30px 10px;
        }

        .logo-area img {
            width: 140px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 16px; /* Dikurangi sedikit agar tidak terlalu bongsor */
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600; /* Jika masih terlalu tebal, ganti ke 500 */
            border-radius: 12px;
            margin-bottom: 4px;
            font-size: 0.85rem; /* Ukuran standar agar tidak terlalu besar */
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* Pastikan icon di dalam nav-item punya jarak yang pas */
        .nav-item i, .nav-item span {
            margin-right: 10px;
        }

        /* --- MAIN CONTENT --- */
        .content {
            flex-grow: 1;
            padding: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-title h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userFullName {
            font-weight: 700;
            color: var(--primary);
        }

        /* --- TABLE SECTION --- */
        .table-section {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        #searchPenerimaan {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 320px;
            font-family: inherit;
            font-size: 0.9rem;
            background: #f1f5f9;
            transition: all 0.2s;
        }

        #searchPenerimaan:focus {
            outline: none;
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            border-bottom: 2px solid var(--bg-main);
        }

        td {
            padding: 18px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .tag-orange { background: #fff7ed; color: #9a3412; }
        .tag-green { background: #f0fdf4; color: #166534; }

        .btn-receive {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-receive:hover { background: var(--primary-hover); }
        .btn-receive:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        #btnLogout {
            background: #fff;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar no-print">
        <div style="margin-bottom: 30px; padding: 0 10px;">
            <img src="eslab-logo.gif" alt="Logo" style="width: 150px;">
        </div>
        <nav id="dynamicSidebar">
            </nav>
    </aside>

    <main class="content">
        <header class="top-bar">
            <div class="header-title">
                <h2>Penerimaan Sampel</h2>
                <p>Validasi kedatangan sampel dari lapangan ke Laboratorium.</p>
            </div>
            
            <div class="user-profile">
                <span id="userFullName">Memuat...</span>
                <button id="btnLogout">Keluar</button>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <h3 style="font-weight: 800;">Log Antrean Sampel</h3>
                <input type="text" id="searchPenerimaan" placeholder="Cari ID Sampel atau Perusahaan...">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID Sampel</th>
                        <th>Informasi Sampel</th>
                        <th>Status Lab</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="penerimaanTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            Menghubungkan ke database...
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="penerimaan.js"></script>
</body>
</html>
