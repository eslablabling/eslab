<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sampling Lapangan | PT Envirotama Solusindo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
    <style>
        /* --- COPY THEME DARI DASHBOARD --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; color: #1e293b; 
            display: flex; min-height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR (Sesuai Dashboard) --- */
        .sidebar {
            width: 280px; background: #ffffff; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; padding: 30px 20px;
        }
        .brand img { width: 200px; object-fit: contain; margin-bottom: 40px; }
        .nav-item {
            padding: 12px 16px; border-radius: 12px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s; color: #64748b;
            font-weight: 600; font-size: 0.85rem; display: flex;
            align-items: center; gap: 12px; text-decoration: none;
        }
        .nav-item:hover, .nav-item.active { background: #eff6ff; color: #2563eb; }

        /* --- MAIN CONTENT --- */
        .main { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* --- TABLE STYLE (Sesuai Dashboard) --- */
        .data-container {
            background: #ffffff; border: 1px solid #e2e8f0;
            border-radius: 24px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px; color: #64748b; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; text-align: left;}
        td { padding: 16px; font-size: 0.85rem; border-bottom: 1px solid #f1f5f9; color: #334155; }

        /* --- INPUT FIELD STYLE --- */
        .inp-field {
            width: 100%; padding: 10px; border: 1px solid #e2e8f0;
            border-radius: 10px; font-family: inherit; outline: none; transition: 0.2s;
        }
        .inp-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* --- MODAL (Tema Dashboard) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); display: none; 
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; width: 90%; max-width: 900px; padding: 32px;
            border-radius: 24px; max-height: 85vh; overflow-y: auto;
        }

        /* Container kartu utama */
.sampling-card-item {
    background: #ffffff; 
    border: 1px solid #e2e8f0;
    border-radius: 16px; 
    margin-bottom: 24px; /* Jarak antar ID Sampel */
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

/* Header ID Sampel */
.card-header-id {
    background: #d97706; 
    color: white; 
    padding: 12px 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
}

/* Container Konten */
.card-body-sampling {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr; /* Membagi dua panel: Insitu vs Inlab */
    gap: 20px;
}

/* Section Styling */
.section-panel {
    border-radius: 12px;
    padding: 16px;
    height: 100%;
}

.panel-insitu { background: #fffbeb; border: 1px solid #fef3c7; }
.panel-inlab { background: #f8fafc; border: 1px solid #e2e8f0; }

.section-title {
    font-size: 0.7rem; 
    font-weight: 800; 
    color: #b45309; 
    margin-bottom: 15px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
}
        
        .tag { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .tag-blue { background: #dbeafe; color: #1e40af; }
        .tag-green { background: #dcfce7; color: #166534; }
        
        .btn-save {
            background: #2563eb; color: white; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-save:hover { background: #1d4ed8; }
        .grid-field {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Membagi 2 kolom */
    gap: 12px;
}
.full-width { grid-column: span 2; } /* Field yang lebar (catatan) */
.input-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
.tab-btn {
    padding: 8px 16px;
    border: none;
    background: #f1f5f9;
    color: #64748b;
    font-weight: 800;
    font-size: 0.7rem;
    cursor: pointer;
    border-radius: 6px;
    white-space: nowrap;
    transition: 0.2s;
}

.tab-btn.active {
    background: #2563eb;
    color: white;
}

.tab-btn:hover:not(.active) {
    background: #e2e8f0;
}
.btn-input {
    background: #eff6ff;
    color: #2563eb;
    border: 1px solid #dbeafe;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
}

.btn-input:hover {
    background: #2563eb;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.btn-input i {
    font-size: 0.9rem;
}
.page-btn {
    padding: 8px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: white;
    font-weight: 700;
    cursor: pointer;
    color: #64748b;
    font-size: 0.8rem;
    transition: all 0.2s;
}
.page-btn:hover {
    background: #f1f5f9;
    color: #1e293b;
    border-color: #cbd5e1;
}
.page-btn.active {
    background: #2563eb;
    color: white;
    border-color: #2563eb;
}
.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><img src="eslab-logo.gif" alt="Logo"></div>
        
        <nav class="nav-menu" id="dynamicSidebar">
            <p style="padding: 20px; color: #94a3b8; font-size: 0.8rem;">Memuat Menu...</p>
        </nav>
    </aside>

    <main class="main">
        <div class="top-bar">
            <div class="welcome-text">
                <h2 id="userName">Data Sampling</h2>
                <p>Input parameter fisik dan teknis dari lapangan.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <input type="text" id="searchBox" placeholder="Cari No. COC..." class="inp-field" style="width: 200px;">
                <div id="currentDate" style="font-size: 0.8rem; font-weight: 700; color: #475569; background: #fff; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 12px;">
                    ...
                </div>
            </div>
        </div>
        <!-- Tab Filter Status Sampling -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tabBelumVerif" class="tab-btn active" onclick="switchSamplingTab('belum_verif')">⏳ Belum Verifikasi</button>
            <button id="tabSudahVerif" class="tab-btn" onclick="switchSamplingTab('sudah_verif')">✅ Sudah Verifikasi</button>
        </div>

        <div class="data-container">
            <table>
                <thead>
                    <tr>
                        <th>No. COC</th>
                        <th>Pelanggan</th>
                        <th>Lokasi</th>
                        <th>Progress</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="samplingTableBody">
                    </tbody>
            </table>
            
            <!-- Panel Paginasi -->
            <div id="paginationControls" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; flex-wrap: wrap; gap: 10px;">
                <div id="paginationInfo" style="color: #64748b; font-weight: 600;">
                    Menampilkan 0 - 0 dari 0 data
                </div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button id="btnPrevPage" class="page-btn">Sebelumnya</button>
                    <div id="pageNumbers" style="display: flex; gap: 5px;"></div>
                    <button id="btnNextPage" class="page-btn">Berikutnya</button>
                </div>
            </div>
        </div>
    </main>

    <div id="modalSamplingInput" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
                <div>
                    <h3 id="mdlNoCoc" style="font-size: 1.25rem; font-weight: 800;">Input Data Teknis</h3>
                    <p id="mdlCompany" style="color: #64748b; font-size: 0.9rem;"></p>
                </div>
                <button onclick="closeSamplingModal()" style="background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer;">✕</button>
            </div>
            <div class="modal-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
                <button class="tab-btn active" onclick="switchTab('identitas')">📋 Identitas & Meteorologi</button>
                <button class="tab-btn" onclick="switchTab('gas')">📟 Gas Direct Reading</button>
                <button class="tab-btn" onclick="switchTab('opacity')">☁️ Opasitas</button>
                <button class="tab-btn" onclick="switchTab('isokinetic')">🏗️ Partikulat Isokinetik</button>
            </div>
            
            <div id="samplingDetailContainer"></div>

            <div style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
                <button onclick="closeSamplingModal()" style="background: none; border: none; color: #64748b; font-weight: 600; cursor: pointer;">Batal</button>
                <button id="btnSaveSampling" class="btn-save" onclick="saveAllSamplingData()">💾 Simpan Data Lapangan</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js?v=2"></script>
    <script src="sampling.js?v=3"></script>
</body>
</html>
